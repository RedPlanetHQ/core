x-logging: &logging-config
  driver: local
  options:
    max-size: 20m
    max-file: "5"
    compress: "true"

version: "3.8"

services:
  # ===========================================
  # CORE App - KI-Power Hauptanwendung
  # ===========================================
  core:
    container_name: core-app
    image: redplanethq/core:${VERSION:-0.4.0}
    restart: unless-stopped
    logging: *logging-config
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MAGIC_LINK_SECRET=${MAGIC_LINK_SECRET}
      - LOGIN_ORIGIN=${LOGIN_ORIGIN}
      - APP_ORIGIN=${APP_ORIGIN}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_TLS_DISABLED=${REDIS_TLS_DISABLED:-true}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_GOOGLE_CLIENT_ID=${AUTH_GOOGLE_CLIENT_ID:-}
      - AUTH_GOOGLE_CLIENT_SECRET=${AUTH_GOOGLE_CLIENT_SECRET:-}
      - ENABLE_EMAIL_LOGIN=${ENABLE_EMAIL_LOGIN:-true}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - MODEL=${MODEL:-gpt-4.1-2025-04-14}
      - RERANK_PROVIDER=${RERANK_PROVIDER:-none}
      - QUEUE_PROVIDER=${QUEUE_PROVIDER:-bullmq}
      - SYSTEME_API_KEY=${SYSTEME_API_KEY}
      - HETZNER_API_TOKEN=${HETZNER_API_TOKEN}
    ports:
      - "3033:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # PostgreSQL mit pgvector
  # ===========================================
  postgres:
    container_name: core-postgres
    image: pgvector/pgvector:pg18-trixie
    restart: unless-stopped
    logging: *logging-config
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kipower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-core}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kipower}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Redis - Cache & Queue
  # ===========================================
  redis:
    container_name: core-redis
    image: redis:7-alpine
    restart: unless-stopped
    logging: *logging-config
    volumes:
      - redis_data:/data
    networks:
      - core
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Neo4j - Graph Database
  # ===========================================
  neo4j:
    container_name: core-neo4j
    image: redplanethq/neo4j:0.1.0
    restart: unless-stopped
    logging: *logging-config
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use_neo4j_config=true
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
    networks:
      - core
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ===========================================
  # n8n - Workflow Automation
  # ===========================================
  n8n:
    container_name: core-n8n
    image: n8nio/n8n:latest
    restart: unless-stopped
    logging: *logging-config
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_PATH=/n8n/
      - N8N_EDITOR_BASE_URL=${APP_ORIGIN}/n8n/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - core

  # ===========================================
  # OpenClaw - AI Assistant + Telegram Bot
  # ===========================================
  openclaw:
    container_name: openclaw
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    logging: *logging-config
    environment:
      - OPENCLAW_MODEL_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_SANDBOX=true
      - TZ=Europe/Berlin
    ports:
      - "18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - core

networks:
  core:
    name: core
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  n8n_data:
  openclaw_data:
