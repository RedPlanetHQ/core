# KI-Power Digital Fast Food System - Nginx Reverse Proxy
# Automatisch generiert vom Setup-Script

upstream core_app {
    server 127.0.0.1:3033;
}

upstream n8n_app {
    server 127.0.0.1:5678;
}

# HTTP → HTTPS Redirect (aktiviert wenn Domain gesetzt)
# server {
#     listen 80;
#     server_name DOMAIN_PLACEHOLDER;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # CORE App (Hauptanwendung)
    location / {
        proxy_pass http://core_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # n8n Workflow Automation
    location /n8n/ {
        proxy_pass http://n8n_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
