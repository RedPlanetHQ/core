# nginx reverse proxy — single external port (7787) for gateway + cliproxy.
#
# Routing:
#   /llmproxy/*  → cliproxy  (CLIProxyAPI on :8317, prefix stripped)
#   /*           → gateway   (CoreBrain gateway on :7788)
#
# BYOK base URL to configure in CORE:  https://<gateway-host>/llmproxy/v1
#
# This file is included inside nginx's http{} block via conf.d/, so map
# directives are valid here.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 7787;

    # CLIProxy — strip /llmproxy prefix, forward remainder to cliproxy.
    # e.g. /llmproxy/v1/chat/completions → http://127.0.0.1:8317/v1/chat/completions
    location /llmproxy/ {
        proxy_pass         http://127.0.0.1:8317/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Liveness check answered by nginx itself — no gateway needed.
    # Railway (and any load balancer) hits this to decide if the container
    # is alive. The gateway takes several seconds to start; answering here
    # lets Railway consider the container healthy immediately so it stops
    # restarting before the gateway has a chance to bind.
    location = /healthz/public {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Gateway — manifest, healthz, verify, api/*
    location / {
        proxy_pass              http://127.0.0.1:7788;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        client_max_body_size    50m;
        # Retry during gateway startup — connect timeout keeps the wait short
        # so nginx retries rather than immediately returning 502.
        proxy_connect_timeout   2s;
        proxy_next_upstream     error timeout;
        proxy_next_upstream_tries 5;
    }
}
