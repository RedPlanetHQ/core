# CoreBrain Gateway — single-container deploy.
#
# Boots a CORE gateway with the two coding agents (claude-code + codex) and
# Playwright Chromium pre-installed and `/app` pre-approved as the workspace
# folder. Pair this with the webapp's "Register gateway" dialog: the
# gateway prints its security key on first boot, you paste it (with the
# public URL) into the webapp.
#
# Usage:
#   cp .env.example .env       # edit values
#   docker compose up -d
#   docker compose logs -f corebrain-gateway   # grab the security key
#
# Persistent volumes:
#   workspace      → /app               cloned repos + worktrees
#   corebrain-home → /home/corebrain    gateway state (.corebrain), agent
#                                       login + session state (.claude,
#                                       .codex, …), playwright chromium
#                                       cache (.cache/ms-playwright). One
#                                       mount covers every agent's $HOME
#                                       state so adding a new coding agent
#                                       doesn't need a new volume.

services:
  corebrain-gateway:
    container_name: corebrain-gateway
    image: redplanethq/core-gateway:0.6.13
    # Image is published amd64-only today. Apple Silicon hosts run it under
    # Rosetta emulation; remove this line once we publish a multi-arch image.
    platform: linux/amd64
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      # ── CORE webapp wiring ───────────────────────────────────────────
      # API_URL is where this gateway reports back to (your CORE webapp).
      # API_KEY is your personal access token for that workspace.
      - COREBRAIN_API_URL=${COREBRAIN_API_URL}
      - COREBRAIN_API_KEY=${COREBRAIN_API_KEY}

      # ── Gateway identity ────────────────────────────────────────────
      - COREBRAIN_GATEWAY_NAME=${COREBRAIN_GATEWAY_NAME:-cloud-gateway}
      - COREBRAIN_GATEWAY_DESCRIPTION=${COREBRAIN_GATEWAY_DESCRIPTION:-Cloud-hosted CoreBrain gateway}

      # Security key used by the webapp to authenticate to this gateway.
      # Leave unset on first boot; the gateway will generate one and print
      # it to `docker compose logs`. Pin it to a known value here once you
      # have it, so subsequent restarts don't re-prompt.
      - COREBRAIN_GATEWAY_SECURITY_KEY=${COREBRAIN_GATEWAY_SECURITY_KEY:-}

      # ── Coding agent auth (env-only — no webapp UI for tokens) ──────
      # claude-code: long-lived token from `claude setup-token`.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # codex-cli: standard OpenAI API key.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── Git credentials for `git clone` of private repos ────────────
      # The entrypoint configures the credential helper from this token and
      # auto-fetches author identity (name/email) from the GitHub API.
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

      # ── Container baked-in defaults ────────────────────────────────-
      - COREBRAIN_DEFAULT_WORKSPACE=/app
      - COREBRAIN_DEPLOY_MODE=docker

      # ── Slot toggles ───────────────────────────────────────────────-
      # `COREBRAIN_SLOT_<NAME>=true|false` overrides the on-disk slot
      # config (set via `corebrain gateway config`). `files` defaults
      # off in docker because `exec` already covers read/write/edit via
      # shell — flip to `true` if you want both tool groups exposed.
      # The same pattern works for BROWSER / CODING / EXEC.
      - COREBRAIN_SLOT_FILES=${COREBRAIN_SLOT_FILES:-false}

      # ── LLM subscription proxy (built into the image) ──────────────
      # CLIProxyAPI is bundled inside this container and exposed at
      # `/llmproxy/v1` on the same port as the gateway. Log in to your
      # Claude / Codex / Antigravity / xAI subscriptions from your laptop:
      #
      #   npm install -g @redplanethq/corebrain
      #   corebrain login
      #   corebrain gateway llmproxy --login claude   # (or codex/antigravity/xai)
      #
      # The subscription API key CORE uses to hit /llmproxy/v1 is the same
      # value as COREBRAIN_GATEWAY_SECURITY_KEY — no separate key to manage.
      # See DEPLOY.md and docs/gateway/subscription-proxy.mdx for details.
      #
      # CLIPROXY_OVERRIDE_CONFIG_B64: base64 of a full cliproxy config.yaml.
      #   When set, replaces the auto-generated config completely — use it
      #   when you need to pin multiple api-keys, enable remote-management,
      #   or otherwise diverge from the defaults the entrypoint writes.
      - CLIPROXY_OVERRIDE_CONFIG_B64=${CLIPROXY_OVERRIDE_CONFIG_B64:-}
    ports:
      # nginx listens on 7787 and routes internally to gateway (:7788)
      # and cliproxy (:8317). Only this single port needs to be published.
      - "${COREBRAIN_GATEWAY_HTTP_PORT:-7787}:7787"
    volumes:
      - workspace:/app
      - corebrain-home:/home/corebrain

volumes:
  workspace:
  corebrain-home:
