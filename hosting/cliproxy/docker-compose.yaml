# CLIProxyAPI — self-host your Claude Max / ChatGPT Plus / Codex / Gemini /
# Grok subscription behind a single OpenAI-compatible endpoint, then plug it
# into CORE as a workspace BYOK provider.
#
# This compose file is for LOCAL use — running the proxy on your laptop and
# doing the OAuth login flow interactively. For hosted deployments (Railway,
# Fly, VPS) where you want to seed OAuth tokens via env vars instead of
# logging in inside the container, see ./DEPLOY.md — that path uses the
# redplanethq/cliproxy wrapper image (built by
# .github/workflows/build-cliproxy-image.yml).
#
# ⚠  Terms of Service — subscription plans (Pro / Max / Plus / Codex) are
#    licensed for interactive use. Using them as a headless backend for a
#    hosted service is a gray area; providers can rate-limit or revoke
#    OAuth tokens if they detect abuse. Personal self-host = fine.
#    Serving other users = risky.
#
# ─── Usage ─────────────────────────────────────────────────────────────────
#
# 1. Boot the proxy:
#      docker compose up -d
#
# 2. Log in to each subscription you want to use. The `-no-browser` flag
#    prints a URL — paste it into your laptop's browser (the OAuth callback
#    lands on localhost:1455 / :54545 which is published below):
#
#      docker compose exec cli-proxy-api \
#        /CLIProxyAPI/CLIProxyAPI -no-browser --codex-login
#
#      docker compose exec cli-proxy-api \
#        /CLIProxyAPI/CLIProxyAPI -no-browser --claude-login
#
#    (Also available: --gemini-login, --qwen-login, --iflow-login.)
#
# 3. Wire it into CORE — in the webapp, open Workspace Settings → Models →
#    add a BYOK entry for the OpenAI provider:
#
#      Base URL:  http://<host>:${CLIPROXY_PORT:-8317}/v1
#      API key:   <one of the api-keys from your config.yaml>
#
#    Then set your workspace's model to route through openai, e.g.
#      openai/claude-sonnet-4-6      (uses your Claude Max login)
#      openai/gpt-5.5                (uses your Codex login)
#
#    The `openai/` prefix forces CORE's router to send the call through the
#    proxy URL you configured; the model id after the slash is passed to
#    CLIProxyAPI, which dispatches to whichever subscription can serve it.
#
# 4. Remote hosting: if you run this on a VPS instead of your laptop, keep
#    the OAuth callback ports (1455 / 54545) bound to 127.0.0.1 there and
#    SSH-forward them to your laptop during the login step only. Leave the
#    main API port (${CLIPROXY_PORT:-8317}) open only if CORE runs on a
#    different host — otherwise put both on the same docker network.
#
# ─── Volumes ───────────────────────────────────────────────────────────────
#
#   cli_proxy_auth   → /root/.cli-proxy-api   OAuth tokens for every logged-in
#                                             subscription. Losing this means
#                                             re-running every --*-login above.
#   ./config.yaml    → /CLIProxyAPI/config.yaml (bind-mount; edit locally)

services:
  cli-proxy-api:
    container_name: cli-proxy-api
    image: eceasy/cli-proxy-api:latest
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      # Main OpenAI-compatible API — this is what CORE talks to.
      - "${CLIPROXY_PORT:-8317}:8317"
      # OAuth callback ports — only needed during --*-login. Bound to
      # 127.0.0.1 so they aren't exposed to the network by accident.
      - "127.0.0.1:1455:1455"     # Codex / ChatGPT
      - "127.0.0.1:54545:54545"   # Claude
      - "127.0.0.1:8085:8085"     # Gemini
      - "127.0.0.1:51121:51121"   # Qwen
      - "127.0.0.1:11451:11451"   # iFlow
    volumes:
      - cli_proxy_auth:/root/.cli-proxy-api
      - ./config.yaml:/CLIProxyAPI/config.yaml:ro
    networks:
      - cliproxy

networks:
  cliproxy:
    name: cliproxy
    driver: bridge

volumes:
  cli_proxy_auth:
