name: Release Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "[0-9]*"

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        # Imports the .p12 into a fresh keychain so subsequent codesign
        # calls (for the Swift helper, below) can find the identity.
        # tauri-action will also import the cert during its own signing
        # phase later — both imports are idempotent.
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build universal Swift voice helper
        # Build for both Mac architectures, lipo into a fat binary.
        # Tauri's tauri-action below copies this into
        # Core.app/Contents/Resources/core-voice via the bundle.resources
        # entry in tauri.macos.conf.json. CORE_VOICE_PREBUILT tells
        # build.rs not to overwrite this with a single-arch build
        # during the per-arch cargo passes.
        run: |
          set -euo pipefail
          cd apps/tauri/src-tauri/swift-voice
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          mkdir -p ../binaries
          lipo -create \
            .build/arm64-apple-macosx/release/core-voice \
            .build/x86_64-apple-macosx/release/core-voice \
            -output ../binaries/core-voice
          lipo -info ../binaries/core-voice

      - name: Codesign Swift voice helper
        # Apple notarization rejects unsigned binaries inside the .app
        # bundle. Tauri only signs the bundle's main executable + the
        # bundle itself; nested binaries in Contents/Resources/ aren't
        # touched. Sign the helper here with hardened runtime, secure
        # timestamp, and the same Developer ID Tauri will use for the app.
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          cd apps/tauri/src-tauri
          codesign --force --options runtime --timestamp \
            --entitlements entitlements.mac.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            binaries/core-voice
          codesign --verify --strict --verbose=2 binaries/core-voice

      - name: Build and release (macOS universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Skip the swift compile inside build.rs — we already produced
          # a universal helper above and don't want it overwritten.
          CORE_VOICE_PREBUILT: "1"
        with:
          projectPath: apps/tauri
          tagName: ${{ github.ref_name }}
          releaseName: CORE ${{ github.ref_name }}
          releaseBody: "See release notes."
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release (Linux AppImage)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/tauri
          tagName: ${{ github.ref_name }}
          releaseName: CORE ${{ github.ref_name }}
          releaseBody: "See release notes."
          releaseDraft: false
          prerelease: false
          args: --bundles appimage
